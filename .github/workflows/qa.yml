name: QA — Live browser render check

on:
  pull_request:
    types: [labeled]

jobs:
  qa:
    name: Puppeteer embed render
    if: github.event.label.name == 'qa'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer dependencies
        run: npm ci
        working-directory: scripts/browser-qa

      - name: Install Chrome
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq google-chrome-stable

      - name: Generate HTML from fixture
        env:
          HTML_OUTPUT_DIR: /tmp
          PUBLIC_BASE_URL: http://localhost
          API_ID: "0"
          API_HASH: "0"
          PHONE_NUMBER: "0"
          CHANNEL_USERNAMES: "placeholder"
          TARGET_CHANNEL: "0"
          CLAUDE_API_KEY: "placeholder"
        run: |
          python digest.py --fixture tests/fixtures/sample_digest.json \
                           --dry-run \
                           --output /tmp/qa-digest.html

      - name: Run Puppeteer QA
        env:
          CHROME_PATH: /usr/bin/google-chrome
        run: node scripts/browser-qa/test.js /tmp/qa-digest.html

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-artifacts-pr-${{ github.event.pull_request.number }}
          path: |
            scripts/browser-qa/*.png
            /tmp/qa-digest.html
          retention-days: 14

      - name: Post result as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body;
            try {
              const result = fs.readFileSync('scripts/browser-qa/result.txt', 'utf8');
              const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
              body = `### QA Result\n\`\`\`\n${result}\`\`\`\n[Screenshots & full log](${runUrl})`;
            } catch (e) {
              body = `### QA Result\n❌ Could not read result.txt — check the [workflow log](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
